{% extends "admin/base_admin.html" %}
{% block content %}
<form method="post" class="login-card">
  <img src="{{ url_for('static', filename='img/logo.png') }}" alt="" class="login-logo">
  <h1>TREIL ZOOM</h1>
  <p class="login-sub">Вхід в адмін-панель</p>
  <label>Логін <input type="text" name="username" required autocomplete="username"></label>
  <label>Пароль <input type="password" name="password" required autocomplete="current-password"></label>
  <button type="submit" class="btn btn-primary btn-lg">Увійти</button>
  <a href="{{ url_for('index') }}" class="login-back">← На сайт</a>
</form>
{% endblock %}
