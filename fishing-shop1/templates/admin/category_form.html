{% extends "admin/base_admin.html" %}
{% block title %}Редагувати категорію{% endblock %}
{% block content %}
<div class="page-head">
  <h1>Редагувати категорію</h1>
  <a href="{{ url_for('admin_categories') }}" class="btn btn-sm">← Назад</a>
</div>

<form method="post" class="form-card">
  <label>Назва *
    <input type="text" name="name" value="{{ category.name }}" required>
  </label>
  <label>Slug (для URL)
    <input type="text" name="slug" value="{{ category.slug }}">
    <small class="hint">Латиниця: prikormky, aromaty…</small>
  </label>
  <label>Порядок у меню
    <input type="number" name="sort_order" value="{{ category.sort_order or 0 }}" min="0">
  </label>
  <div class="acts-row">
    <button type="submit" class="btn btn-primary">Зберегти</button>
    <a href="{{ url_for('admin_categories') }}" class="btn">Скасувати</a>
  </div>
</form>
{% endblock %}
